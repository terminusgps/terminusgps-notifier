{% extends "terminusgps_notifier/layout.html" %}
{% partialdef main %}
<form class="w-full" method="post" action="{{ url }}" hx-boost="false">
    {% csrf_token %}
    <input type="hidden" id="id_token" name="token" value="{{ token }}">
    <button class="w-full p-2 border text-center rounded bg-stone-300 border-stone-600 transition-colors ease-in-out duration-300 hover:bg-stone-100 dark:bg-gray-800 dark:border-gray-900 dark:hover:bg-gray-600 cursor-pointer" type="submit">Manage Profile</button>
</form>
{% endpartialdef main %}
{% block content %}
{% partial main %}
{% endblock content %}
