{% extends "terminusgps_notifier/layout.html" %}
{% partialdef main %}
<form class="@container flex flex-col gap-8" method="post" hx-target="this" hx-swap="outerHTML">
    {% csrf_token %}
    <div class="">
        <label class="font-semibold" for="id_resource">Resource</label>
        <select class="p-2 rounded border bg-stone-50" id="id_resource" name="resource" required>
            {% for choice in choices %}
            <option value="{{ choice.id }}">{{ choice.nm }}</option>
            {% endfor %}
        <select>
    </div>
    <button class="px-4 py-2 cursor-pointer rounded border border-terminus-red-600 bg-terminus-red-800 text-gray-100 transition-colors ease-in-out duration-300 hover:bg-terminus-red-400" type="submit" hx-post="{% url 'terminusgps_notifier:select resource' %}">Next</button>
</form>
{% endpartialdef main %}
{% block content %}
{% partial main %}
{% endblock content %}
