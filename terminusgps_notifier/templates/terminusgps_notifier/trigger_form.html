{% extends "terminusgps_notifier/layout.html" %}
{% block title %}Select Trigger{% endblock title %}
{% partialdef main %}
<div class="flex flex-col gap-8">
    <div id="greeting" class="@container p-8 border bg-stone-50 border-stone-300 shadow-sm rounded flex flex-col gap-8">
        <h3 class="font-semibold">Terminus GPS Notifier</h3>
    </div>
    <form class="@container p-8 border bg-stone-50 border-stone-300 shadow-sm rounded flex flex-col gap-8" method="post" action="{% url 'terminusgps_notifier:trigger form' resource_id %}">
        {% csrf_token %}
        <div class="flex flex-col gap-2">
            <select class="peer p-2 border rounded bg-stone-50" id="id_trigger" name="trigger" hx-get="{% url 'terminusgps_notifier:trigger parameters' %}" hx-include="this" hx-trigger="load once, change" hx-swap="innerHTML" hx-target="#id_trigger_parameters">
                {% for value, label in triggers %}
                <option value="{{ value }}">{{ label }}</option>
                {% endfor %}
            </select>
            <label class="font-semibold order-first" for="id_trigger">Trigger:</label>
            <div id="id_trigger_helptext" class="text-sm">
                <p>Select a trigger from the list.</p>
            </div>
        </div>
        <div class="flex flex-col gap-2" id="id_trigger_parameters" name="trigger_parameters"></div>
        <button class="px-4 py-2 border border-current cursor-pointer rounded text-gray-100 bg-terminus-red-800 hover:bg-terminus-red-400 ease-in-out duration-300 transition-colors" type="submit">Next</button>
    </form>
</div>
{% endpartialdef main %}
{% block content %}
{% partial main %}
{% endblock content %}
