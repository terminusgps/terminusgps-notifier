{% extends "terminusgps_notifier/layout.html" %}
{% block title %}{{ notification.n }}{% endblock title %}
{% partialdef main %}
<div class="flex flex-col gap-8">
    <div id="greeting" class="@container p-8 border bg-stone-50 border-stone-300 shadow-sm rounded flex flex-col gap-8">
        <h3 class="font-semibold">Terminus GPS Notifier</h3>
    </div>
    <div id="details" class="@container p-8 border bg-stone-50 border-stone-300 shadow-sm rounded flex flex-col gap-8">
        <div class="relative">
            <h3 class="font-semibold">{{ notification.n }}</h3>
            {% if method != None %}
            <div>
                <label for="id_method">Method: </label>
                <select id="id_method" name="method" class="p-2 border rounded">
                    <option value="sms"{% if method == "sms" %} selected{% endif %}>SMS</option>
                    <option value="voice"{% if method == "voice" %} selected{% endif %}>Voice</option>
                </select>
            </div>
            {% endif %}
        </div>
    </div>
</div>
{% endpartialdef main %}
{% block content %}
{% partial main %}
{% endblock content %}
