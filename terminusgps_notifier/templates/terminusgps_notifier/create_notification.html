{% extends "terminusgps_notifier/layout.html" %}
{% block title %}Create Notification{% endblock title %}
{% partialdef main %}
<form
    class="@container flex flex-col gap-8"
    method="post"
    action="{% url 'terminusgps_notifier:create notification' %}"
>
    {% csrf_token %}
    <input type="text" id="id_itemId" name="itemId" value="{{ itemId }}">
    <input type="text" id="id_id" name="id" value="0">
    <input type="text" id="id_callMode" name="callMode" value="create">
    <input type="text" id="id_n" name="n" value="{{ n }}">
    <input type="text" id="id_txt" name="txt" value="{{ txt }}">
    <input type="number" id="id_ta" name="ta" value="{{ ta|default:0 }}">
    <input type="number" id="id_td" name="td" value="{{ td|default:0 }}">
</form>
{% endpartialdef main %}
{% block content %}
{% partial main %}
{% endblock content %}
