{% extends "terminusgps_notifier/layout.html" %}
{% block title %}Notification List{% endblock title %}
{% partialdef main %}
<div id="notification-list">
    {% for notif in notification_list %}
    <a href="{% url 'terminusgps_notifier:detail notification' resource_id notif.id %}">
        <div id="{{ notif.id }}">{{ notif.n }}</div>
    </a>
    {% endfor %}
</div>
{% endpartialdef main %}
{% block content %}
{% partial main %}
{% endblock content %}
